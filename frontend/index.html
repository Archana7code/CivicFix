<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicFix | Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-700">

<!-- NAVBAR -->
<nav class="bg-white border-b border-slate-200 px-8 py-4 flex items-center">
  <div class="flex items-center gap-2">
    <div class="bg-blue-600 p-2 rounded-full">
      <i class="fa-solid fa-city text-white text-xs"></i>
    </div>
    <span class="font-bold text-xl">CivicFix</span>
  </div>

  <div class="ml-10 hidden md:flex gap-8 text-sm font-medium text-slate-500">
    <a href="#index.html" class="hover:text-blue-600">Home</a>
    <a href="page.html" class="hover:text-blue-600">Report</a>
    
    
    <a href="admin-login.html">Admin</a>
  </div>
</nav>

<!-- HERO -->
<section class="max-w-6xl mx-auto px-6 py-14 grid md:grid-cols-2 gap-10 items-center">
  <div>
    <h1 class="text-4xl font-extrabold mb-4">
      Make Your City Better, One Report at a Time
    </h1>
    <p class="text-slate-500 mb-6">
      Report city issues in seconds. Track progress transparently.
    </p>

    <div class="flex gap-4">
      <a href="page.html"
         class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">
        + Report an Issue
      </a>
      <a href="#recent"
         class="border px-6 py-3 rounded-xl font-bold">
        View Reports
      </a>
    </div>
  </div>

  <img
  src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
  alt="City"
  class="w-full h-[360px] object-cover rounded-2xl shadow"
/>

</section>

<!-- STATS -->
<section class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6">
  <div class="bg-white p-6 rounded-2xl shadow">
    <h4 class="text-sm text-slate-500">Total Reports</h4>
    <h2 id="totalReports" class="text-3xl font-bold">0</h2>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow">
    <h4 class="text-sm text-slate-500">In Progress</h4>
    <h2 id="inProgress" class="text-3xl font-bold">0</h2>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow">
    <h4 class="text-sm text-slate-500">Resolved</h4>
    <h2 id="resolved" class="text-3xl font-bold">0</h2>
  </div>
</section>

<!-- RECENT REPORTS -->
<section id="recent" class="max-w-6xl mx-auto px-6 py-12">
  <h3 class="text-xl font-bold mb-4">Recent Reports</h3>

  <div id="recentReports" class="space-y-4">
    Loading...
  </div>
</section>

<footer class="text-center text-sm text-slate-400 py-6">
  CivicFix © 2026 · Smart City Reporting
</footer>

<!-- JS -->
 <script src="./config.js"></script>

<script>
async function loadDashboard() {
  try {
    const res = await fetch("http://localhost:5000/api/issues");
    const data = await res.json();

    console.log("HOME API RESPONSE:", data); // 👈 DEBUG LINE

    const issues = data.issues || [];

    // Stats
    document.getElementById("totalReports").innerText = issues.length;

    document.getElementById("inProgress").innerText =
      issues.filter(i => i.status === "In Progress").length;

    document.getElementById("resolved").innerText =
      issues.filter(i => i.status === "Resolved").length;

    // Recent reports
    const container = document.getElementById("recentReports");

    if (issues.length === 0) {
      container.innerHTML = "<p class='text-slate-400'>No reports found</p>";
      return;
    }

    container.innerHTML = issues.slice(0, 5).map(issue => `
      <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
        <div>
          <p class="font-bold capitalize">${issue.issueType}</p>
          <p class="text-xs text-slate-500">
            ${new Date(issue.createdAt).toDateString()}
          </p>
        </div>
        <span class="text-xs font-bold px-3 py-1 rounded-full
          ${issue.status === "Resolved" ? "bg-green-100 text-green-600" :
            issue.status === "In-Progress" ? "bg-yellow-100 text-yellow-600" :
            "bg-red-100 text-red-600"}">
          ${issue.status}
        </span>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    document.getElementById("recentReports").innerText =
      "Failed to load reports";
  }
}

loadDashboard();
</script>


</body>
</html>
